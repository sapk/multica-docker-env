name: Docker

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"
  pull_request:
    branches: [main]
  # Rebuild rolling "latest" images (nvm master, Node latest, upstream CLIs, multica-backend:latest).
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      multica_tag:
        description: "Tag of ghcr.io/multica-ai/multica-backend to copy multica CLI from"
        required: false
        default: "latest"
        type: string
      push:
        description: "Push images to GHCR (requires packages:write)"
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'schedule' && 'nightly' || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  MULTICA_BACKEND_IMAGE: ghcr.io/multica-ai/multica-backend
  AGENT_IMAGE_PREFIX: ghcr.io/sapk/multica-agent

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      multica_tag: ${{ steps.multica.outputs.tag }}
      push: ${{ steps.push.outputs.enabled }}
      multica_backend_image: ${{ steps.images.outputs.multica_backend_image }}
      agent_image_prefix: ${{ steps.images.outputs.agent_image_prefix }}
    steps:
      - name: Resolve Multica backend tag
        id: multica
        run: |
          if [[ -n "${{ inputs.multica_tag }}" ]]; then
            tag="${{ inputs.multica_tag }}"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            tag="latest"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="latest"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Using ${MULTICA_BACKEND_IMAGE}:${tag} for /app/multica"

      - name: Resolve push
        id: push
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.push }}" != "true" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve image refs
        id: images
        run: |
          # Pass workflow env values downstream. The `env` context is not
          # available in the `with:` inputs of a workflow_call, so the
          # build-base job must read these via `needs.resolve.outputs.*`.
          echo "multica_backend_image=${MULTICA_BACKEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "agent_image_prefix=${AGENT_IMAGE_PREFIX}" >> "$GITHUB_OUTPUT"

  build-base:
    needs: resolve
    uses: ./.github/workflows/_build-agent-base.yml
    with:
      base_image_tag: ${{ needs.resolve.outputs.agent_image_prefix }}-base:${{ github.sha }}
      multica_image: ${{ needs.resolve.outputs.multica_backend_image }}
      multica_tag: ${{ needs.resolve.outputs.multica_tag }}
      cache_scope: agent-base

  build:
    needs: [resolve, build-base]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [claude, cursor, opencode, codex, agy]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/multica-agent-${{ matrix.variant }}
          labels: |
            org.opencontainers.image.title=Multica Agent (${{ matrix.variant }})
            org.opencontainers.image.description=Multica daemon with ${{ matrix.variant }} CLI and rootless Podman
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') || github.event_name == 'schedule' }}
            type=raw,value={{date 'YYYY-MM-DD'}},enable=${{ github.event_name == 'schedule' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.agent
          target: ${{ matrix.variant }}
          platforms: linux/amd64,linux/arm64
          pull: true
          push: ${{ needs.resolve.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AGENT_BASE_IMAGE=${{ env.AGENT_IMAGE_PREFIX }}-base:${{ github.sha }}
          cache-from: |
            type=gha,scope=agent-${{ matrix.variant }}
            ${{ needs.resolve.outputs.push == 'true' && format('type=registry,ref={0}/multica-agent-{1}:latest', env.REGISTRY, matrix.variant) || '' }}
          cache-to: type=gha,mode=max,scope=agent-${{ matrix.variant }}

      - name: Inspect manifest
        if: needs.resolve.outputs.push == 'true'
        run: |
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ github.repository_owner }}/multica-agent-${{ matrix.variant }}:latest" \
            || docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ github.repository_owner }}/multica-agent-${{ matrix.variant }}:${{ needs.resolve.outputs.multica_tag }}"
