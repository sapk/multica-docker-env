name: Staging Build

on:
  repository_dispatch:
    types: [staging-push]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref on sapk-fork/multica to build (branch, tag, or SHA)"
        required: false
        default: "features/staging"
        type: string
      push:
        description: "Push images to GHCR"
        required: false
        default: true
        type: boolean
      verbose_progress:
        description: "Show per-step BuildKit timings on build-web and build-backend jobs (sets BUILDKIT_PROGRESS=plain)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.client_payload.ref || github.event.inputs.ref || 'features/staging' }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  STAGING_REPO: sapk-fork/multica
  BACKEND_IMAGE: ghcr.io/sapk/multica-backend
  WEB_IMAGE: ghcr.io/sapk/multica-web
  AGENT_IMAGE_PREFIX: ghcr.io/sapk/multica-agent

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      push: ${{ steps.resolve.outputs.push }}
      backend_image: ${{ steps.resolve.outputs.backend_image }}
      web_image: ${{ steps.resolve.outputs.web_image }}
      agent_image_prefix: ${{ steps.resolve.outputs.agent_image_prefix }}
    steps:
      - name: Resolve inputs
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            ref="${{ github.event.client_payload.ref }}"
            echo "ref=${ref:-features/staging}" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            ref="${{ inputs.ref }}"
            push="${{ inputs.push }}"
            echo "ref=${ref:-features/staging}" >> "$GITHUB_OUTPUT"
            echo "push=${push:-true}" >> "$GITHUB_OUTPUT"
          fi
          # Pass workflow env values downstream. The `env` context is not
          # available in the `with:` inputs of a workflow_call, so the
          # build-agent-base job must read these via `needs.resolve.outputs.*`.
          echo "backend_image=${BACKEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "web_image=${WEB_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "agent_image_prefix=${AGENT_IMAGE_PREFIX}" >> "$GITHUB_OUTPUT"

  build-backend:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    env:
      BUILDKIT_PROGRESS: ${{ inputs.verbose_progress == 'true' && 'plain' || 'auto' }}
    steps:
      - name: Prepare platform env
        env:
          PLATFORM: ${{ matrix.platform }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
        run: |
          arch="${PLATFORM##*/}"
          echo "ARCH=${arch}" >> "$GITHUB_ENV"
          echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
          echo "CACHE_SCOPE=multica-backend-staging-${arch}" >> "$GITHUB_ENV"
          echo "CACHE_REF=${BACKEND_IMAGE}:cache-staging-${arch}" >> "$GITHUB_ENV"

      - name: Checkout sapk-fork/multica
        uses: actions/checkout@v6
        with:
          repository: ${{ env.STAGING_REPO }}
          ref: ${{ needs.resolve.outputs.ref }}
          path: multica-src
          fetch-depth: 0

      - name: Record commit SHA and Go pseudo-version
        id: sha
        run: |
          sha="$(git -C multica-src rev-parse HEAD)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

          # Fetch tags from upstream (sapk-fork doesn't have them)
          git -C multica-src fetch --tags https://github.com/multica-ai/multica.git 2>/dev/null || true

          # Compute Go-style pseudo-version (timestamp must be UTC)
          timestamp=$(TZ=UTC git -C multica-src log -1 --format=%cd --date=format:%Y%m%d%H%M%S)
          short_sha="${sha:0:12}"

          # Check if we have any tags
          if git -C multica-src describe --tags --exact-match HEAD >/dev/null 2>&1; then
            # Exact tag match - use as-is
            version=$(git -C multica-src describe --tags --exact-match HEAD)
          elif git -C multica-src describe --tags --abbrev=0 HEAD >/dev/null 2>&1; then
            # Has prior tag - create pseudo-version with bumped patch
            base_tag=$(git -C multica-src describe --tags --abbrev=0 HEAD)
            # Parse vX.Y.Z and bump Z
            if [[ "$base_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch=$(( ${BASH_REMATCH[3]} + 1 ))
              version="v${major}.${minor}.${patch}-0.${timestamp}-${short_sha}"
            else
              # Pre-release or non-standard tag
              version="${base_tag}.0.${timestamp}-${short_sha}"
            fi
          else
            # No tags at all
            version="v0.0.0-${timestamp}-${short_sha}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Building commit: ${sha} (version: ${version})"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: needs.resolve.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: multica-src
          platforms: ${{ matrix.platform }}
          pull: true
          push: ${{ needs.resolve.outputs.push == 'true' }}
          outputs: type=image,name=${{ env.BACKEND_IMAGE }},push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true
          build-args: |
            VERSION=${{ steps.sha.outputs.version }}
            COMMIT=${{ steps.sha.outputs.sha }}
            DATE=${{ steps.sha.outputs.date }}
          cache-from: |
            type=gha,scope=${{ env.CACHE_SCOPE }}
            type=registry,ref=${{ env.CACHE_REF }}
          cache-to: type=registry,ref=${{ env.CACHE_REF }},mode=max

      - name: Export digest
        if: needs.resolve.outputs.push == 'true'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: needs.resolve.outputs.push == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-backend-merge:
    needs: [resolve, build-backend]
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.setup-sha.outputs.sha }}
    steps:
      - name: Expose backend SHA
        id: setup-sha
        if: needs.resolve.outputs.push == 'true'
        run: |
          sha="${{ needs.build-backend.outputs.sha }}"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "Backend SHA: ${sha}"

      - name: Download digests
        if: needs.resolve.outputs.push == 'true'
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: needs.resolve.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge multi-arch backend manifest
        if: needs.resolve.outputs.push == 'true'
        working-directory: /tmp/digests
        run: |
          backend_image="${{ needs.resolve.outputs.backend_image }}"
          # Both matrix legs checkout the same ref, so outputs.sha is identical
          # on both legs and "last one wins" is safe.
          sha="${{ needs.build-backend.outputs.sha }}"
          # The digests/* files are named by digest (empty content).
          # The printf below substitutes the filename (the digest) into the
          # @sha256:... reference for each per-arch image.
          docker buildx imagetools create \
            --tag "${backend_image}:staging" \
            --tag "${backend_image}:staging-sha-${sha}" \
            $(printf '${{ needs.resolve.outputs.backend_image }}@sha256:%s ' *)
          echo "::notice::Merged multi-arch manifest at ${backend_image}:staging and ${backend_image}:staging-sha-${sha}"
          docker buildx imagetools inspect "${backend_image}:staging"

      - name: Skip notice
        if: needs.resolve.outputs.push != 'true'
        run: echo "skipping merge (push=false)"

  build-web:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    env:
      BUILDKIT_PROGRESS: ${{ inputs.verbose_progress == 'true' && 'plain' || 'auto' }}
    steps:
      - name: Prepare platform env
        env:
          PLATFORM: ${{ matrix.platform }}
          WEB_IMAGE: ${{ env.WEB_IMAGE }}
        run: |
          arch="${PLATFORM##*/}"
          echo "ARCH=${arch}" >> "$GITHUB_ENV"
          echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
          echo "CACHE_SCOPE=multica-web-staging-${arch}" >> "$GITHUB_ENV"
          echo "CACHE_REF=${WEB_IMAGE}:cache-staging-${arch}" >> "$GITHUB_ENV"

      - name: Checkout sapk-fork/multica
        uses: actions/checkout@v6
        with:
          repository: ${{ env.STAGING_REPO }}
          ref: ${{ needs.resolve.outputs.ref }}
          path: multica-src

      - name: Record commit SHA
        id: sha
        run: |
          sha="$(git -C multica-src rev-parse HEAD)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: needs.resolve.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.WEB_IMAGE }}
          labels: |
            org.opencontainers.image.title=Multica Web [staging]
            org.opencontainers.image.description=Multica web frontend (${{ matrix.platform }}) — staging build from sapk-fork/multica@${{ needs.resolve.outputs.ref }}
            multica.staging.ref=${{ needs.resolve.outputs.ref }}
            multica.staging.sha=${{ steps.sha.outputs.sha }}
            multica.staging.platform=${{ matrix.platform }}
          tags: |
            type=raw,value=staging
            type=raw,value=staging-sha-${{ steps.sha.outputs.sha }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: multica-src
          file: multica-src/Dockerfile.web
          platforms: ${{ matrix.platform }}
          pull: true
          push: ${{ needs.resolve.outputs.push == 'true' }}
          # OCI mediatypes disabled on purpose: with oci-mediatypes=true on a
          # single-platform build, buildx wraps the image in an OCI image
          # index, and `outputs.digest` returns the *index* digest. The merge
          # step then references that digest as a manifest in
          # `docker buildx imagetools create`, which fails with
          # `manifest unknown` (GHCR has the index at that digest, not a
          # manifest). Docker V2 schema-2 mediatypes give us a flat
          # per-platform manifest whose digest is the one we want to hand
          # to the merge step.
          outputs: type=image,name=${{ env.WEB_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.sha.outputs.sha }}
          cache-from: |
            type=gha,scope=${{ env.CACHE_SCOPE }}
            type=registry,ref=${{ env.CACHE_REF }}
          cache-to: type=registry,ref=${{ env.CACHE_REF }},mode=max

      - name: Export digest
        if: needs.resolve.outputs.push == 'true'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: needs.resolve.outputs.push == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-web-merge:
    needs: [resolve, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        if: needs.resolve.outputs.push == 'true'
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: needs.resolve.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge multi-arch web manifest
        if: needs.resolve.outputs.push == 'true'
        working-directory: /tmp/digests
        run: |
          web_image="${{ needs.resolve.outputs.web_image }}"
          # Both matrix legs checkout the same ref, so outputs.sha is identical
          # on both legs and "last one wins" is safe.
          sha="${{ needs.build-web.outputs.sha }}"
          # The digests/* files are named by digest (empty content).
          # The printf below substitutes the filename (the digest) into the
          # @sha256:... reference for each per-arch image.
          docker buildx imagetools create \
            --tag "${web_image}:staging" \
            --tag "${web_image}:staging-sha-${sha}" \
            $(printf '${{ needs.resolve.outputs.web_image }}@sha256:%s ' *)
          echo "::notice::Merged multi-arch manifest at ${web_image}:staging and ${web_image}:staging-sha-${sha}"
          docker buildx imagetools inspect "${web_image}:staging"

      - name: Skip notice
        if: needs.resolve.outputs.push != 'true'
        run: echo "skipping merge (push=false)"

  build-agent-base:
    needs: [resolve, build-backend-merge]
    uses: ./.github/workflows/_build-agent-base.yml
    with:
      base_image_tag: ${{ needs.resolve.outputs.agent_image_prefix }}-base:staging-sha-${{ needs.build-backend-merge.outputs.sha }}
      multica_image: ${{ needs.resolve.outputs.backend_image }}
      multica_tag: staging-sha-${{ needs.build-backend-merge.outputs.sha }}
      cache_scope: agent-base-staging
      push: ${{ needs.resolve.outputs.push == 'true' }}

  build-agents:
    needs: [resolve, build-backend-merge, build-agent-base]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [claude, cursor, opencode, codex, agy]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.AGENT_IMAGE_PREFIX }}-${{ matrix.variant }}
          labels: |
            org.opencontainers.image.title=Multica Agent (${{ matrix.variant }}) [staging]
            org.opencontainers.image.description=Multica daemon with ${{ matrix.variant }} CLI — staging build from sapk-fork/multica@${{ needs.resolve.outputs.ref }}
            multica.staging.ref=${{ needs.resolve.outputs.ref }}
            multica.staging.sha=${{ needs.build-backend-merge.outputs.sha }}
          tags: |
            type=raw,value=staging
            type=raw,value=staging-sha-${{ needs.build-backend-merge.outputs.sha }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.agent
          target: ${{ matrix.variant }}
          platforms: linux/amd64,linux/arm64
          pull: true
          push: ${{ needs.resolve.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AGENT_BASE_IMAGE=${{ env.AGENT_IMAGE_PREFIX }}-base:staging-sha-${{ needs.build-backend-merge.outputs.sha }}
          cache-from: |
            type=gha,scope=agent-${{ matrix.variant }}
            ${{ needs.resolve.outputs.push == 'true' && format('type=registry,ref={0}-{1}:staging', env.AGENT_IMAGE_PREFIX, matrix.variant) || '' }}
          cache-to: type=gha,mode=max,scope=agent-${{ matrix.variant }}
