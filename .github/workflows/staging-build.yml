name: Staging Build

on:
  repository_dispatch:
    types: [staging-push]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref on sapk-fork/multica to build (branch, tag, or SHA)"
        required: false
        default: "features/staging"
        type: string
      push:
        description: "Push images to GHCR"
        required: false
        default: true
        type: boolean
      verbose_progress:
        description: "Show per-step BuildKit timings on build-web jobs (sets BUILDKIT_PROGRESS=plain)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.client_payload.ref || github.event.inputs.ref || 'features/staging' }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  STAGING_REPO: sapk-fork/multica
  BACKEND_IMAGE: ghcr.io/sapk/multica-backend
  WEB_IMAGE: ghcr.io/sapk/multica-web
  AGENT_IMAGE_PREFIX: ghcr.io/sapk/multica-agent

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      push: ${{ steps.resolve.outputs.push }}
      backend_image: ${{ steps.resolve.outputs.backend_image }}
      web_image: ${{ steps.resolve.outputs.web_image }}
      agent_image_prefix: ${{ steps.resolve.outputs.agent_image_prefix }}
    steps:
      - name: Resolve inputs
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            ref="${{ github.event.client_payload.ref }}"
            echo "ref=${ref:-features/staging}" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            ref="${{ inputs.ref }}"
            push="${{ inputs.push }}"
            echo "ref=${ref:-features/staging}" >> "$GITHUB_OUTPUT"
            echo "push=${push:-true}" >> "$GITHUB_OUTPUT"
          fi
          # Pass workflow env values downstream. The `env` context is not
          # available in the `with:` inputs of a workflow_call, so the
          # build-agent-base job must read these via `needs.resolve.outputs.*`.
          echo "backend_image=${BACKEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "web_image=${WEB_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "agent_image_prefix=${AGENT_IMAGE_PREFIX}" >> "$GITHUB_OUTPUT"

  build-backend:
    needs: resolve
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Checkout sapk-fork/multica
        uses: actions/checkout@v6
        with:
          repository: ${{ env.STAGING_REPO }}
          ref: ${{ needs.resolve.outputs.ref }}
          path: multica-src
          fetch-depth: 0

      - name: Record commit SHA
        id: sha
        run: |
          sha="$(git -C multica-src rev-parse HEAD)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          
          # Fetch tags from upstream (sapk-fork doesn't have them)
          git -C multica-src fetch --tags https://github.com/multica-ai/multica.git 2>/dev/null || true
          
          # Compute Go-style pseudo-version (timestamp must be UTC)
          timestamp=$(TZ=UTC git -C multica-src log -1 --format=%cd --date=format:%Y%m%d%H%M%S)
          short_sha="${sha:0:12}"
          
          # Check if we have any tags
          if git -C multica-src describe --tags --exact-match HEAD >/dev/null 2>&1; then
            # Exact tag match - use as-is
            version=$(git -C multica-src describe --tags --exact-match HEAD)
          elif git -C multica-src describe --tags --abbrev=0 HEAD >/dev/null 2>&1; then
            # Has prior tag - create pseudo-version with bumped patch
            base_tag=$(git -C multica-src describe --tags --abbrev=0 HEAD)
            # Parse vX.Y.Z and bump Z
            if [[ "$base_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch=$(( ${BASH_REMATCH[3]} + 1 ))
              version="v${major}.${minor}.${patch}-0.${timestamp}-${short_sha}"
            else
              # Pre-release or non-standard tag
              version="${base_tag}.0.${timestamp}-${short_sha}"
            fi
          else
            # No tags at all
            version="v0.0.0-${timestamp}-${short_sha}"
          fi
          
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Building commit: ${sha} (version: ${version})"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: needs.resolve.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: multica-src
          platforms: linux/amd64,linux/arm64
          pull: true
          push: ${{ needs.resolve.outputs.push == 'true' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:staging
            ${{ env.BACKEND_IMAGE }}:staging-sha-${{ steps.sha.outputs.sha }}
          build-args: |
            VERSION=${{ steps.sha.outputs.version }}
            COMMIT=${{ steps.sha.outputs.sha }}
            DATE=${{ steps.sha.outputs.date }}
          cache-from: |
            type=gha,scope=multica-backend-staging
            type=registry,ref=${{ env.BACKEND_IMAGE }}:staging
          cache-to: type=gha,mode=max,scope=multica-backend-staging

  build-web-amd64:
    needs: resolve
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    env:
      BUILDKIT_PROGRESS: ${{ inputs.verbose_progress == 'true' && 'plain' || 'auto' }}
    steps:
      - name: Checkout sapk-fork/multica
        uses: actions/checkout@v6
        with:
          repository: ${{ env.STAGING_REPO }}
          ref: ${{ needs.resolve.outputs.ref }}
          path: multica-src

      - name: Record commit SHA
        id: sha
        run: |
          sha="$(git -C multica-src rev-parse HEAD)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: needs.resolve.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.WEB_IMAGE }}
          labels: |
            org.opencontainers.image.title=Multica Web [staging]
            org.opencontainers.image.description=Multica web frontend (linux/amd64) — staging build from sapk-fork/multica@${{ needs.resolve.outputs.ref }}
            multica.staging.ref=${{ needs.resolve.outputs.ref }}
            multica.staging.sha=${{ steps.sha.outputs.sha }}
            multica.staging.platform=linux/amd64
          tags: |
            type=raw,value=staging
            type=raw,value=staging-sha-${{ steps.sha.outputs.sha }}
            type=raw,value=staging-amd64

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: multica-src
          file: multica-src/Dockerfile.web
          platforms: linux/amd64
          pull: true
          push: ${{ needs.resolve.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.sha.outputs.sha }}
          cache-from: |
            type=gha,scope=multica-web-staging-amd64
            type=registry,ref=${{ env.WEB_IMAGE }}:staging-amd64
          cache-to: type=registry,ref=${{ env.WEB_IMAGE }}:staging-amd64,mode=max

  build-web-arm64:
    needs: resolve
    runs-on: ubuntu-24.04-arm
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    env:
      BUILDKIT_PROGRESS: ${{ inputs.verbose_progress == 'true' && 'plain' || 'auto' }}
    steps:
      - name: Checkout sapk-fork/multica
        uses: actions/checkout@v6
        with:
          repository: ${{ env.STAGING_REPO }}
          ref: ${{ needs.resolve.outputs.ref }}
          path: multica-src

      - name: Record commit SHA
        id: sha
        run: |
          sha="$(git -C multica-src rev-parse HEAD)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: needs.resolve.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.WEB_IMAGE }}
          labels: |
            org.opencontainers.image.title=Multica Web [staging]
            org.opencontainers.image.description=Multica web frontend (linux/arm64) — staging build from sapk-fork/multica@${{ needs.resolve.outputs.ref }}
            multica.staging.ref=${{ needs.resolve.outputs.ref }}
            multica.staging.sha=${{ steps.sha.outputs.sha }}
            multica.staging.platform=linux/arm64
          tags: |
            type=raw,value=staging
            type=raw,value=staging-sha-${{ steps.sha.outputs.sha }}
            type=raw,value=staging-arm64

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: multica-src
          file: multica-src/Dockerfile.web
          platforms: linux/arm64
          pull: true
          push: ${{ needs.resolve.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.sha.outputs.sha }}
          cache-from: |
            type=gha,scope=multica-web-staging-arm64
            type=registry,ref=${{ env.WEB_IMAGE }}:staging-arm64
          cache-to: type=registry,ref=${{ env.WEB_IMAGE }}:staging-arm64,mode=max

  build-web-merge:
    needs: [resolve, build-web-amd64, build-web-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: needs.resolve.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge multi-arch manifest
        if: needs.resolve.outputs.push == 'true'
        run: |
          web_image="${{ needs.resolve.outputs.web_image }}"
          sha="${{ needs.build-web-amd64.outputs.sha }}"
          docker buildx imagetools create \
            --tag "${web_image}:staging" \
            --tag "${web_image}:staging-sha-${sha}" \
            "${web_image}:staging-amd64" \
            "${web_image}:staging-arm64"
          echo "::notice::Merged multi-arch manifest at ${web_image}:staging and ${web_image}:staging-sha-${sha}"
          docker buildx imagetools inspect "${web_image}:staging"

      - name: Skip notice
        if: needs.resolve.outputs.push != 'true'
        run: echo "skipping merge (push=false)"

  build-agent-base:
    needs: [resolve, build-backend]
    uses: ./.github/workflows/_build-agent-base.yml
    with:
      base_image_tag: ${{ needs.resolve.outputs.agent_image_prefix }}-base:staging-sha-${{ needs.build-backend.outputs.sha }}
      multica_image: ${{ needs.resolve.outputs.backend_image }}
      multica_tag: staging-sha-${{ needs.build-backend.outputs.sha }}
      cache_scope: agent-base-staging
      setup_qemu: true

  build-agents:
    needs: [resolve, build-backend, build-agent-base]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [claude, cursor, opencode, codex, gemini, agy]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.AGENT_IMAGE_PREFIX }}-${{ matrix.variant }}
          labels: |
            org.opencontainers.image.title=Multica Agent (${{ matrix.variant }}) [staging]
            org.opencontainers.image.description=Multica daemon with ${{ matrix.variant }} CLI — staging build from sapk-fork/multica@${{ needs.resolve.outputs.ref }}
            multica.staging.ref=${{ needs.resolve.outputs.ref }}
            multica.staging.sha=${{ needs.build-backend.outputs.sha }}
          tags: |
            type=raw,value=staging
            type=raw,value=staging-sha-${{ needs.build-backend.outputs.sha }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.agent
          target: ${{ matrix.variant }}
          platforms: linux/amd64,linux/arm64
          pull: true
          push: ${{ needs.resolve.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AGENT_BASE_IMAGE=${{ env.AGENT_IMAGE_PREFIX }}-base:staging-sha-${{ needs.build-backend.outputs.sha }}
          cache-from: |
            type=gha,scope=agent-${{ matrix.variant }}
            ${{ needs.resolve.outputs.push == 'true' && format('type=registry,ref={0}-{1}:staging', env.AGENT_IMAGE_PREFIX, matrix.variant) || '' }}
          cache-to: type=gha,mode=max,scope=agent-${{ matrix.variant }}
