name: Build agent base

on:
  workflow_call:
    inputs:
      base_image_tag:
        description: "Full image:tag to push the base as (e.g. ghcr.io/sapk/multica-agent-base:abc123)"
        required: true
        type: string
      multica_image:
        description: "Image to copy /app/multica from (e.g. ghcr.io/multica-ai/multica-backend)"
        required: true
        type: string
      multica_tag:
        description: "Tag of the multica image"
        required: true
        type: string
      cache_scope:
        description: "GHA cache scope for this base (e.g. agent-base or agent-base-staging)"
        required: true
        type: string
      cache_from_registry_ref:
        description: "Registry ref for cache-from (e.g. …-base:latest or …-base:staging). Empty to skip."
        required: false
        type: string
        default: ""
      setup_qemu:
        description: "Whether to set up QEMU (needed for cross-platform builds)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        if: inputs.setup_qemu
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent base
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.agent
          target: base
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          tags: ${{ inputs.base_image_tag }}
          build-args: |
            MULTICA_IMAGE=${{ inputs.multica_image }}
            MULTICA_TAG=${{ inputs.multica_tag }}
          cache-from: |
            type=gha,scope=${{ inputs.cache_scope }}
            ${{ inputs.cache_from_registry_ref && format('type=registry,ref={0}', inputs.cache_from_registry_ref) || '' }}
          cache-to: type=gha,mode=max,scope=${{ inputs.cache_scope }}
