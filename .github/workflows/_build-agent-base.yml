name: Build agent base

on:
  workflow_call:
    inputs:
      base_image_tag:
        description: "Full image:tag to push the base as (e.g. ghcr.io/sapk/multica-agent-base:abc123)"
        required: true
        type: string
      multica_image:
        description: "Image to copy /app/multica from (e.g. ghcr.io/multica-ai/multica-backend)"
        required: true
        type: string
      multica_tag:
        description: "Tag of the multica image"
        required: true
        type: string
      cache_scope:
        description: "GHA cache scope for this base (e.g. agent-base or agent-base-staging)"
        required: true
        type: string
      cache_from_registry_ref:
        description: "Base registry ref for the cache (e.g. ghcr.io/sapk/multica-agent-base:staging). The per-arch jobs append -amd64-cache/-arm64-cache to read the cache from a separate registry ref. Empty to skip."
        required: false
        type: string
        default: ""
      push:
        description: "Push images to GHCR (merge step is skipped when false)"
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      base_image_tag:
        description: "Full image:tag to push the base as (defaults to ghcr.io/sapk/multica-agent-base:dispatch)"
        required: false
        default: "ghcr.io/sapk/multica-agent-base:dispatch"
        type: string
      multica_image:
        description: "Image to copy /app/multica from"
        required: false
        default: "ghcr.io/multica-ai/multica-backend"
        type: string
      multica_tag:
        description: "Tag of the multica image"
        required: false
        default: "latest"
        type: string
      cache_scope:
        description: "GHA cache scope for this base"
        required: false
        default: "agent-base-dispatch"
        type: string
      cache_from_registry_ref:
        description: "Base registry ref for the cache. The per-arch jobs append -amd64-cache/-arm64-cache. Empty to skip."
        required: false
        default: ""
        type: string
      push:
        description: "Push images to GHCR"
        required: false
        default: true
        type: boolean
      verbose_progress:
        description: "Show per-step BuildKit timings on the platform jobs (sets BUILDKIT_PROGRESS=plain)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    env:
      BUILDKIT_PROGRESS: ${{ inputs.verbose_progress == 'true' && 'plain' || 'auto' }}
    steps:
      - name: Prepare platform env
        env:
          PLATFORM: ${{ matrix.platform }}
          BASE_IMAGE_TAG: ${{ inputs.base_image_tag }}
          CACHE_SCOPE_BASE: ${{ inputs.cache_scope }}
          CACHE_FROM_REGISTRY_REF: ${{ inputs.cache_from_registry_ref }}
        run: |
          arch="${PLATFORM##*/}"
          echo "ARCH=${arch}" >> "$GITHUB_ENV"
          echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
          # Strip the :tag from base_image_tag for use in the `outputs: name=` field
          # below. With push-by-digest=true, buildx rejects `name=image:tag` and
          # requires `name=image` (the canonical digest form is added by
          # name-canonical=true).
          echo "BASE_IMAGE_NAME=${BASE_IMAGE_TAG%:*}" >> "$GITHUB_ENV"
          echo "CACHE_SCOPE=${CACHE_SCOPE_BASE}-${arch}" >> "$GITHUB_ENV"
          if [[ -n "${CACHE_FROM_REGISTRY_REF}" ]]; then
            echo "CACHE_REGISTRY_REF=${CACHE_FROM_REGISTRY_REF}-${arch}-cache" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.agent
          target: base
          platforms: ${{ matrix.platform }}
          pull: true
          push: ${{ inputs.push }}
          outputs: type=image,name=${{ env.BASE_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true
          build-args: |
            MULTICA_IMAGE=${{ inputs.multica_image }}
            MULTICA_TAG=${{ inputs.multica_tag }}
          cache-from: |
            type=gha,scope=${{ env.CACHE_SCOPE }}
            ${{ env.CACHE_REGISTRY_REF && format('type=registry,ref={0}', env.CACHE_REGISTRY_REF) || '' }}
          cache-to: type=registry,ref=${{ inputs.base_image_tag }}-${{ env.ARCH }}-cache,mode=max

      - name: Export digest
        if: inputs.push
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: inputs.push
        uses: actions/upload-artifact@v4
        with:
          name: digests-agent-base-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        if: inputs.push
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-agent-base-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge multi-arch agent base manifest
        if: inputs.push
        working-directory: /tmp/digests
        run: |
          base_image_tag="${{ inputs.base_image_tag }}"
          # Strip the :tag from base_image_tag for the per-arch digest references.
          # A reference of the form `image:tag@sha256:...` is malformed, so we
          # use the bare image name plus the digest. Derived inline because the
          # build job's BASE_IMAGE_NAME env var is not visible in this separate
          # merge job (GHA env vars don't propagate across jobs).
          base_image_name="${base_image_tag%:*}"
          # The digests/* files are named by digest (empty content). The printf
          # below substitutes each filename (the digest) into the @sha256:...
          # reference, producing one `image@sha256:<digest>` per per-arch image.
          # The image name is embedded in the format string as a literal; only
          # the digest is a %s placeholder.
          docker buildx imagetools create \
            --tag "${base_image_tag}" \
            $(printf "${base_image_name}@sha256:%s " *)
          echo "::notice::Merged multi-arch manifest at ${base_image_tag}"
          docker buildx imagetools inspect "${base_image_tag}"

      - name: Skip notice
        if: inputs.push != true
        run: echo "skipping merge (push=false)"
